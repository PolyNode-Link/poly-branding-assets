<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&amp;family=Plus+Jakarta+Sans:wght@700;800&amp;family=Noto+Kufi+Arabic:wght@700&amp;display=swap');
            
            .title {
                font-family: 'Plus Jakarta Sans', 'Noto Kufi Arabic', sans-serif;
                font-size: 115px;
                font-weight: 800;
                fill: #ffffff;
                letter-spacing: -3px;
                text-anchor: middle;
            }
            
            .pill-text {
                font-family: 'JetBrains Mono', monospace;
                font-size: 34px;
                font-weight: 700;
                fill: #ffffff;
                text-anchor: middle;
                dominant-baseline: middle;
            }
            
            .message-container {
                display: flex;
                justify-content: center;
                align-items: center;
                text-align: center;
                height: 100%;
                width: 100%;
                font-family: 'Plus Jakarta Sans', 'Noto Kufi Arabic', sans-serif;
                font-size: 64px;
                font-weight: 700;
                color: #1e293b;
                line-height: 1.5;
                word-wrap: break-word;
            }
        </style>

        <linearGradient id="primary-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#a5b4fc" />
            <stop offset="50%" stop-color="#c4b5fd" />
            <stop offset="100%" stop-color="#f9a8d4" />
        </linearGradient>

        <pattern id="header-pattern" width="100" height="100" patternUnits="userSpaceOnUse">
            <path d="M11 18c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm48 25c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm-43-7c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm63 31c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zM34 90c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm56-76c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM12 86c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM85 52c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2z" fill="#ffffff" fill-opacity="0.15" fill-rule="evenodd"/>
        </pattern>

        <filter id="header-shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="10" stdDeviation="15" flood-color="#000000" flood-opacity="0.02" />
        </filter>

        <filter id="text-shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="10" stdDeviation="15" flood-color="#000000" flood-opacity="0.1" />
        </filter>

        <filter id="box-shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="40" stdDeviation="40" flood-color="#000000" flood-opacity="0.05" />
        </filter>
    </defs>

    <rect width="1080" height="1920" fill="#ffffff" />

    <g id="header" filter="url(#header-shadow)" opacity="0.95">
        <rect width="1080" height="730" fill="url(#primary-gradient)" />
        <rect width="1080" height="730" fill="url(#header-pattern)" />
    </g>

    <text x="540" y="320" class="title" filter="url(#text-shadow)">{{header}}</text>
    
    <g id="pill" transform="translate(540, 420)">
        <rect x="-175" y="-38" width="350" height="76" rx="38" fill="rgba(255,255,255,0.3)" />
        <text x="0" y="4" class="pill-text">{{pill}}</text>
    </g>

    <path d="M 0 720 A 90 90 0 0 1 90 630 L 990 630 A 90 90 0 0 1 1080 720 L 1080 1920 L 0 1920 Z" fill="#ffffff" />

    <g id="message-box" transform="translate(65, 825)">
        <rect width="950" height="750" rx="60" fill="#a77fc038" stroke="rgba(255,255,255,0.03)" stroke-width="2" filter="url(#box-shadow)" />

        <foreignObject x="85" y="85" width="780" height="580">
            <div xmlns="http://www.w3.org/1999/xhtml" class="message-container">
                {{message}}
            </div>
        </foreignObject>
    </g>
</svg>
